name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # npm install, not npm ci: Windows-generated lockfiles omit transitive deps
      # of linux-only optional bindings (@emnapi/* via rolldown) — npm ci then
      # fails EUSAGE on linux runners. npm install resolves them fine.
      - shell: bash
        run: |
          npm install 2>&1 | tee /tmp/ci.log || {
            tail -n 30 /tmp/ci.log | while IFS= read -r line; do echo "::error::${line}"; done
            exit 1
          }
      - shell: bash
        run: |
          npm run build 2>&1 | tee /tmp/build.log || {
            tail -n 40 /tmp/build.log | while IFS= read -r line; do echo "::error::${line}"; done
            exit 1
          }
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
